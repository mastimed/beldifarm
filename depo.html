<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avicole Cloud Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen">

    <!-- BARRE DE NAVIGATION MOBILE -->
    <nav class="md:hidden bg-green-700 text-white p-4 flex justify-between items-center shadow-lg">
        <h1 class="font-black tracking-tight">AVICOLE CLOUD</h1>
        <i class="fas fa-bars text-xl"></i>
    </nav>

    <div class="flex flex-col md:flex-row">
        <!-- SIDEBAR -->
        <aside class="w-full md:w-72 bg-white h-auto md:h-screen shadow-2xl z-20 sticky top-0">
            <div class="p-8 hidden md:block">
                <h1 class="text-2xl font-black text-green-700 italic">FERME <span class="text-slate-800">PRO</span></h1>
                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest mt-1">Gestion en temps réel</p>
            </div>
            
            <nav class="p-4 space-y-2">
                <button onclick="showTab('dashboard')" class="tab-btn active w-full p-4 flex items-center gap-4 rounded-2xl bg-green-50 text-green-700 font-bold transition">
                    <i class="fas fa-th-large"></i> Dashboard
                </button>
                <button onclick="showTab('expenses')" class="tab-btn w-full p-4 flex items-center gap-4 rounded-2xl text-slate-500 font-bold hover:bg-slate-50 transition">
                    <i class="fas fa-shopping-cart"></i> Dépenses
                </button>
                <button onclick="showTab('sales')" class="tab-btn w-full p-4 flex items-center gap-4 rounded-2xl text-slate-500 font-bold hover:bg-slate-50 transition">
                    <i class="fas fa-cash-register"></i> Ventes
                </button>
                <button onclick="showTab('inventory')" class="tab-btn w-full p-4 flex items-center gap-4 rounded-2xl text-slate-500 font-bold hover:bg-slate-50 transition">
                    <i class="fas fa-warehouse"></i> Stock Aliments
                </button>
            </nav>
        </aside>

        <!-- CONTENU -->
        <main class="flex-1 p-4 md:p-10">
            
            <!-- DASHBOARD -->
            <section id="dashboard" class="tab-content active space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
                        <div class="w-12 h-12 bg-red-50 text-red-500 rounded-2xl flex items-center justify-center mb-4"><i class="fas fa-arrow-down"></i></div>
                        <p class="text-slate-400 font-bold text-sm uppercase">Dépenses Totales</p>
                        <h2 id="total-exp" class="text-3xl font-black text-slate-800 mt-2">0 DH</h2>
                    </div>
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
                        <div class="w-12 h-12 bg-green-50 text-green-500 rounded-2xl flex items-center justify-center mb-4"><i class="fas fa-arrow-up"></i></div>
                        <p class="text-slate-400 font-bold text-sm uppercase">Ventes Totales</p>
                        <h2 id="total-sal" class="text-3xl font-black text-slate-800 mt-2">0 DH</h2>
                    </div>
                    <div id="profit-card" class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
                        <div class="w-12 h-12 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center mb-4"><i class="fas fa-wallet"></i></div>
                        <p class="text-slate-400 font-bold text-sm uppercase">Bénéfice Net</p>
                        <h2 id="total-profit" class="text-3xl font-black text-slate-800 mt-2">0 DH</h2>
                    </div>
                </div>

                <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
                    <h3 class="font-bold text-slate-700 mb-6">Activité Financière</h3>
                    <div class="h-80"><canvas id="chart"></canvas></div>
                </div>
            </section>

            <!-- SECTION DÉPENSES (Similaire aux précédentes mais connectée Firebase) -->
            <section id="expenses" class="tab-content">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-50 mb-8">
                    <h2 class="text-2xl font-black text-slate-800 mb-6">Ajouter une dépense</h2>
                    <form id="exp-form" class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <input type="date" id="e-date" required class="p-4 bg-slate-50 rounded-2xl border-none outline-none ring-2 ring-transparent focus:ring-green-500 transition">
                        <select id="e-cat" class="p-4 bg-slate-50 rounded-2xl border-none outline-none ring-2 ring-transparent focus:ring-green-500 transition font-bold text-slate-600">
                            <option>Nourriture</option>
                            <option>Médicament</option>
                            <option>Matériel</option>
                            <option>Poussins</option>
                        </select>
                        <input type="text" id="e-desc" placeholder="Désignation" required class="p-4 bg-slate-50 rounded-2xl border-none outline-none ring-2 ring-transparent focus:ring-green-500 transition">
                        <input type="number" id="e-amt" placeholder="Montant DH" required class="p-4 bg-slate-50 rounded-2xl border-none outline-none ring-2 ring-transparent focus:ring-green-500 transition font-black">
                        <button type="submit" class="md:col-span-4 bg-slate-800 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-black transition">Enregistrer en ligne</button>
                    </form>
                </div>
                <div id="exp-list" class="space-y-4"></div>
            </section>

            <!-- SECTION VENTES -->
            <section id="sales" class="tab-content">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-50 mb-8">
                    <h2 class="text-2xl font-black text-slate-800 mb-6">Nouvelle Vente</h2>
                    <form id="sal-form" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <input type="date" id="s-date" required class="p-4 bg-slate-50 rounded-2xl border-none outline-none ring-2 ring-transparent focus:ring-green-500 transition">
                        <input type="text" id="s-desc" placeholder="Client / Détail" required class="p-4 bg-slate-50 rounded-2xl border-none outline-none ring-2 ring-transparent focus:ring-green-500 transition">
                        <input type="number" id="s-amt" placeholder="Montant Reçu DH" required class="p-4 bg-slate-50 rounded-2xl border-none outline-none ring-2 ring-transparent focus:ring-green-500 transition font-black text-green-600">
                        <button type="submit" class="md:col-span-3 bg-green-600 text-white p-4 rounded-2xl font-bold shadow-lg hover:bg-green-700 transition">Valider la vente</button>
                    </form>
                </div>
                <div id="sal-list" class="space-y-4"></div>
            </section>

            <!-- SECTION STOCK -->
            <section id="inventory" class="tab-content text-center">
                <div class="max-w-md mx-auto bg-white p-12 rounded-[3rem] shadow-xl">
                    <i class="fas fa-box-open text-6xl text-orange-400 mb-6"></i>
                    <h2 class="text-slate-400 font-bold uppercase tracking-tighter mb-2">Stock Actuel</h2>
                    <div id="stock-val" class="text-7xl font-black text-slate-800 mb-8">0</div>
                    <div class="flex gap-4">
                        <button onclick="updateStock(1)" class="flex-1 bg-green-500 text-white p-4 rounded-2xl font-bold">+ 1 Sac</button>
                        <button onclick="updateStock(-1)" class="flex-1 bg-red-500 text-white p-4 rounded-2xl font-bold">- 1 Sac</button>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- FIREBASE SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURATION FIREBASE (REMPLACEZ PAR VOS INFOS)
        const firebaseConfig = {
            apiKey: "AIzaSyB7aqYe3lgnEvFtSanKRA3450Lkfk0tjys",
  authDomain: "ma-ferme-5dedc.firebaseapp.com",
  projectId: "ma-ferme-5dedc",
  storageBucket: "ma-ferme-5dedc.firebasestorage.app",
  messagingSenderId: "1093409748280",
  appId: "1:1093409748280:web:af8a3022306f070211fdcd",
  measurementId: "G-RMQC2PEEQ8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // RÉCUPÉRATION DES DONNÉES EN TEMPS RÉEL
        function initApp() {
            // Écoute des dépenses
            onSnapshot(query(collection(db, "expenses"), orderBy("date", "desc")), (snap) => {
                let html = '';
                let total = 0;
                snap.forEach(doc => {
                    const d = doc.data();
                    total += d.amt;
                    html += `
                        <div class="bg-white p-6 rounded-2xl flex justify-between items-center shadow-sm border-l-4 border-red-500">
                            <div>
                                <p class="text-xs font-bold text-slate-400">${d.date} - ${d.cat}</p>
                                <h4 class="font-bold text-slate-700">${d.desc}</h4>
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="font-black text-slate-800">${d.amt} DH</span>
                                <button onclick="deleteDoc(doc(db, 'expenses', '${doc.id}'))" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;
                });
                document.getElementById('exp-list').innerHTML = html;
                document.getElementById('total-exp').innerText = total + " DH";
                updateTotals();
            });

            // Écoute des ventes
            onSnapshot(query(collection(db, "sales"), orderBy("date", "desc")), (snap) => {
                let html = '';
                let total = 0;
                snap.forEach(doc => {
                    const d = doc.data();
                    total += d.amt;
                    html += `
                        <div class="bg-white p-6 rounded-2xl flex justify-between items-center shadow-sm border-l-4 border-green-500">
                            <div>
                                <p class="text-xs font-bold text-slate-400">${d.date}</p>
                                <h4 class="font-bold text-slate-700">${d.desc}</h4>
                            </div>
                            <div class="flex items-center gap-4">
                                <span class="font-black text-green-600">${d.amt} DH</span>
                                <button onclick="window.deleteData('sales', '${doc.id}')" class="text-slate-300 hover:text-red-500"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;
                });
                document.getElementById('sal-list').innerHTML = html;
                document.getElementById('total-sal').innerText = total + " DH";
                updateTotals();
            });

            // Écoute du stock (Document unique)
            onSnapshot(doc(db, "settings", "inventory"), (doc) => {
                if(doc.exists()) document.getElementById('stock-val').innerText = doc.data().qty;
            });
        }

        // ENREGISTREMENT
        document.getElementById('exp-form').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "expenses"), {
                date: document.getElementById('e-date').value,
                cat: document.getElementById('e-cat').value,
                desc: document.getElementById('e-desc').value,
                amt: parseFloat(document.getElementById('e-amt').value)
            });
            e.target.reset();
        };

        document.getElementById('sal-form').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "sales"), {
                date: document.getElementById('s-date').value,
                desc: document.getElementById('s-desc').value,
                amt: parseFloat(document.getElementById('s-amt').value)
            });
            e.target.reset();
        };

        window.updateStock = async (val) => {
            const stockRef = doc(db, "settings", "inventory");
            await updateDoc(stockRef, { qty: increment(val) });
        };

        window.deleteData = async (coll, id) => {
            if(confirm("Supprimer ?")) await deleteDoc(doc(db, coll, id));
        };

        function updateTotals() {
            const exp = parseFloat(document.getElementById('total-exp').innerText);
            const sal = parseFloat(document.getElementById('total-sal').innerText);
            const profit = sal - exp;
            const pElem = document.getElementById('total-profit');
            pElem.innerText = profit + " DH";
            document.getElementById('profit-card').className = `p-8 rounded-[2rem] shadow-sm border ${profit >= 0 ? 'bg-green-50 border-green-100 text-green-700' : 'bg-red-50 border-red-100 text-red-700'}`;
        }

        initApp();
    </script>

    <script>
        // NAVIGATION TABS UI
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active', 'bg-green-50', 'text-green-700'));
            
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active', 'bg-green-50', 'text-green-700');
        }

        // CHART (Même logique que précédemment)
        const ctx = document.getElementById('chart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'],
                datasets: [{ label: 'Ventes', data: [12, 19, 3, 5, 2, 3, 9], borderColor: '#10b981', tension: 0.4 }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    </script>
</body>
</html>
