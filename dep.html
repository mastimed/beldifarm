<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beldifarm Pro - Gestion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #app-interface { display: none; }
        .sidebar-active { background: #10b981 !important; color: white !important; }
    </style>
</head>
<body>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md p-10 rounded-[2.5rem] shadow-2xl text-center">
            <h2 class="text-3xl font-black text-slate-800 mb-6 italic">BELDIFARM</h2>
            <form id="login-form" class="space-y-4">
                <input type="email" id="login-email" placeholder="Email" required class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-green-500">
                <input type="password" id="login-pass" placeholder="Mot de passe" required class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none focus:ring-2 focus:ring-green-500">
                <button type="submit" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-black uppercase tracking-widest">Connexion</button>
            </form>
            <p id="login-error" class="mt-4 text-red-500 font-bold hidden">Erreur d'accès</p>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-interface" class="flex flex-col lg:flex-row min-h-screen">
        
        <!-- SIDEBAR -->
        <aside class="w-full lg:w-72 bg-white border-r border-slate-200 flex flex-col">
            <div class="p-8 border-b border-slate-50 flex justify-between items-center">
                <h1 class="text-xl font-extrabold text-slate-800">BELDIFARM</h1>
                <button id="logout-btn" class="text-slate-400 hover:text-red-500"><i class="fas fa-power-off"></i></button>
            </div>
            <nav class="p-6 space-y-2">
                <button data-tab="dashboard" class="nav-btn sidebar-active w-full p-4 rounded-xl flex items-center gap-4 font-bold text-slate-500 transition">
                    <i class="fas fa-th-large"></i> Dashboard
                </button>
                <button data-tab="expenses" class="nav-btn w-full p-4 rounded-xl flex items-center gap-4 font-bold text-slate-500 hover:bg-slate-50 transition">
                    <i class="fas fa-minus-circle"></i> Dépenses
                </button>
                <button data-tab="sales" class="nav-btn w-full p-4 rounded-xl flex items-center gap-4 font-bold text-slate-500 hover:bg-slate-50 transition">
                    <i class="fas fa-plus-circle"></i> Ventes
                </button>
                <button data-tab="inventory" class="nav-btn w-full p-4 rounded-xl flex items-center gap-4 font-bold text-slate-500 hover:bg-slate-50 transition">
                    <i class="fas fa-warehouse"></i> Stock Aliments
                </button>
            </nav>
        </aside>

        <!-- CONTENT -->
        <main class="flex-1 p-6 lg:p-10 overflow-y-auto h-screen">

            <!-- DASHBOARD -->
            <section id="dashboard" class="tab-content active space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                        <p class="text-slate-400 font-bold text-[10px] uppercase mb-1">Dépenses Totales</p>
                        <h2 id="dash-total-exp" class="text-2xl font-black text-slate-900">0 DH</h2>
                    </div>
                    <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                        <p class="text-slate-400 font-bold text-[10px] uppercase mb-1">Ventes Totales</p>
                        <h2 id="dash-total-sal" class="text-2xl font-black text-slate-900">0 DH</h2>
                    </div>
                    <div id="profit-box" class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                        <p class="text-slate-400 font-bold text-[10px] uppercase mb-1">Bénéfice Net</p>
                        <h2 id="dash-profit" class="text-2xl font-black text-slate-900">0 DH</h2>
                    </div>
                </div>

                <!-- Chart -->
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-50">
                    <h4 class="font-bold text-slate-800 mb-6 italic"><i class="fas fa-chart-bar text-red-500 mr-2"></i> Dépenses Mensuelles (DH)</h4>
                    <div class="h-[300px]"><canvas id="expenseChart"></canvas></div>
                </div>

                <!-- Activity -->
                <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-50 overflow-hidden">
                    <div class="p-6 border-b border-slate-50 font-bold text-slate-800 italic">Dernières Opérations</div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-[10px] uppercase font-black text-slate-400">
                                <tr><th class="p-4">Désignation</th><th class="p-4">Catégorie</th><th class="p-4">Date</th><th class="p-4 text-right">Montant</th></tr>
                            </thead>
                            <tbody id="recent-list" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <!-- STOCK SECTION -->
            <section id="inventory" class="tab-content space-y-8">
                <div class="text-center mb-10">
                    <h2 class="text-3xl font-black text-slate-800">Réserve de Nourriture</h2>
                    <p class="text-slate-400 font-bold text-xs uppercase tracking-widest mt-2">Inventaire des sacs en temps réel</p>
                </div>
                <div id="feed-stock-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Les cartes s'afficheront ici via JS -->
                </div>
            </section>

            <!-- EXPENSES -->
            <section id="expenses" class="tab-content space-y-6">
                <div class="bg-white p-8 rounded-[2rem] shadow-sm">
                    <h2 class="text-xl font-black mb-6 italic">Nouvelle Dépense</h2>
                    <form id="exp-form" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                        <input type="date" id="e-date" required class="p-4 bg-slate-50 rounded-xl border-none font-bold">
                        <select id="e-cat" class="p-4 bg-slate-50 rounded-xl border-none font-bold">
                            <option>Nourriture</option><option>Médicament</option><option>Matériel</option><option>Poussins</option><option>Autre</option>
                        </select>
                        <input type="text" id="e-desc" placeholder="Désignation" required class="p-4 bg-slate-50 rounded-xl border-none">
                        <input type="number" id="e-amt" placeholder="Montant DH" required class="p-4 bg-slate-50 rounded-xl border-none font-black text-red-500">
                        <button type="submit" class="md:col-span-4 bg-slate-900 text-white p-4 rounded-xl font-bold uppercase tracking-widest">Enregistrer Dépense</button>
                    </form>
                </div>
                <div id="exp-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </section>

            <!-- SALES -->
            <section id="sales" class="tab-content space-y-6">
                <div class="bg-white p-8 rounded-[2rem] shadow-sm">
                    <h2 class="text-xl font-black mb-6 italic">Encaisser Vente</h2>
                    <form id="sal-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <input type="date" id="s-date" required class="p-4 bg-slate-50 rounded-xl border-none font-bold">
                        <input type="text" id="s-desc" placeholder="Client / Produit" required class="p-4 bg-slate-50 rounded-xl border-none font-bold">
                        <input type="number" id="s-amt" placeholder="Montant DH" required class="p-4 bg-slate-50 rounded-xl border-none font-black text-green-600">
                        <button type="submit" class="md:col-span-3 bg-green-600 text-white p-4 rounded-xl font-bold uppercase tracking-widest">Valider Vente</button>
                    </form>
                </div>
                <div id="sal-list" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </section>

        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, doc, deleteDoc, updateDoc, increment, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyB7aqYe3lgnEvFtSanKRA3450Lkfk0tjys",
  authDomain: "ma-ferme-5dedc.firebaseapp.com",
  projectId: "ma-ferme-5dedc",
  storageBucket: "ma-ferme-5dedc.firebasestorage.app",
  messagingSenderId: "1093409748280",
  appId: "1:1093409748280:web:af8a3022306f070211fdcd",
  measurementId: "G-RMQC2PEEQ8"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI & AUTH
        const loginForm = document.getElementById('login-form');
        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value);
            } catch (err) { document.getElementById('login-error').classList.remove('hidden'); }
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-interface').style.display = 'flex';
                initApp();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app-interface').style.display = 'none';
            }
        });

        // APP LOGIC
        let expenseChart = null;

        function initApp() {
            // STOCK CONFIGURATION (Défini ici pour être sûr qu'il s'affiche)
            const feeds = [
                { id: "ch3ir", label: "Sac Ch3ir", icon: "🌾" },
                { id: "demarage", label: "Sac Démarrage", icon: "🐣" },
                { id: "bayada", label: "Sac Bayada", icon: "🥚" },
                { id: "nokhala", label: "Sac Nokhala", icon: "🍂" },
                { id: "takhlita", label: "Sac Takhlita", icon: "🥣" }
            ];

            // Render Stock Initially
            onSnapshot(doc(db, "settings", "feed_stocks"), (snap) => {
                const data = snap.exists() ? snap.data() : {};
                let html = '';
                feeds.forEach(f => {
                    const qty = data[f.id] || 0;
                    html += `
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-50 text-center">
                        <div class="text-4xl mb-3">${f.icon}</div>
                        <h4 class="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-1">${f.label}</h4>
                        <div class="text-5xl font-black text-slate-800 mb-6">${qty}</div>
                        <div class="flex gap-2">
                            <button onclick="window.changeStock('${f.id}', 1)" class="flex-1 bg-slate-900 text-white py-3 rounded-2xl font-bold hover:scale-105 transition">+1</button>
                            <button onclick="window.changeStock('${f.id}', -1)" class="flex-1 bg-slate-100 text-slate-400 py-3 rounded-2xl font-bold hover:text-red-500 transition">-1</button>
                        </div>
                    </div>`;
                });
                document.getElementById('feed-stock-grid').innerHTML = html;
            });

            // DATA LISTENERS
            onSnapshot(collection(db, "expenses"), (snap) => {
                let total = 0;
                let monthlyData = new Array(12).fill(0);
                let recentHtml = '';
                let expListHtml = '';
                
                const docs = [];
                snap.forEach(d => {
                    const data = d.data();
                    docs.push({id: d.id, ...data});
                    total += data.amt;
                    // Chart calculation
                    const month = new Date(data.date).getMonth();
                    monthlyData[month] += data.amt;
                });

                // Sort docs by date for lists
                docs.sort((a,b) => new Date(b.date) - new Date(a.date));

                docs.forEach((d, index) => {
                    const row = `
                        <div class="bg-white p-6 rounded-3xl flex justify-between items-center shadow-sm border border-slate-50">
                            <div><p class="text-[9px] font-black text-slate-300 uppercase">${d.date} • ${d.cat}</p><h4 class="font-bold text-slate-800">${d.desc}</h4></div>
                            <div class="flex items-center gap-4"><span class="font-black text-red-500">${d.amt.toLocaleString()} DH</span>
                            <button onclick="window.delDoc('expenses', '${d.id}')" class="text-slate-200 hover:text-red-500"><i class="fas fa-trash"></i></button></div>
                        </div>`;
                    expListHtml += row;
                    if(index < 5) {
                        recentHtml += `<tr class="border-b border-slate-50 text-sm"><td class="p-4 font-bold">${d.desc}</td><td class="p-4 text-slate-400 italic">${d.cat}</td><td class="p-4 text-slate-400">${d.date}</td><td class="p-4 text-right font-black text-red-500">${d.amt} DH</td></tr>`;
                    }
                });

                document.getElementById('exp-list').innerHTML = expListHtml;
                document.getElementById('recent-list').innerHTML = recentHtml;
                document.getElementById('dash-total-exp').innerText = total.toLocaleString() + " DH";
                updateChart(monthlyData);
                updateProfit();
            });

            onSnapshot(collection(db, "sales"), (snap) => {
                let total = 0;
                let html = '';
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    total += d.amt;
                    html += `
                    <div class="bg-white p-6 rounded-3xl flex justify-between items-center shadow-sm border border-slate-50">
                        <div><p class="text-[9px] font-black text-slate-300 uppercase">${d.date}</p><h4 class="font-bold text-slate-800">${d.desc}</h4></div>
                        <div class="flex items-center gap-4"><span class="font-black text-green-600">${d.amt.toLocaleString()} DH</span>
                        <button onclick="window.delDoc('sales', '${docSnap.id}')" class="text-slate-200 hover:text-red-500"><i class="fas fa-trash"></i></button></div>
                    </div>`;
                });
                document.getElementById('sal-list').innerHTML = html;
                document.getElementById('dash-total-sal').innerText = total.toLocaleString() + " DH";
                updateProfit();
            });
        }

        // GLOBALS FOR BUTTONS
        window.changeStock = async (id, val) => {
            const ref = doc(db, "settings", "feed_stocks");
            try { await updateDoc(ref, { [id]: increment(val) }); }
            catch(e) { await setDoc(ref, { [id]: val < 0 ? 0 : val }, { merge: true }); }
        };

        window.delDoc = async (c, id) => { if(confirm("Supprimer ?")) await deleteDoc(doc(db, c, id)); };

        // FORMS
        document.getElementById('exp-form').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "expenses"), {
                date: document.getElementById('e-date').value,
                cat: document.getElementById('e-cat').value,
                desc: document.getElementById('e-desc').value,
                amt: parseFloat(document.getElementById('e-amt').value)
            });
            e.target.reset();
        };

        document.getElementById('sal-form').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(collection(db, "sales"), {
                date: document.getElementById('s-date').value,
                desc: document.getElementById('s-desc').value,
                amt: parseFloat(document.getElementById('s-amt').value)
            });
            e.target.reset();
        };

        function updateProfit() {
            const exp = parseFloat(document.getElementById('dash-total-exp').innerText.replace(/\s/g, '')) || 0;
            const sal = parseFloat(document.getElementById('dash-total-sal').innerText.replace(/\s/g, '')) || 0;
            const net = sal - exp;
            const pBox = document.getElementById('profit-box');
            document.getElementById('dash-profit').innerText = net.toLocaleString() + " DH";
            pBox.className = `p-6 rounded-[2rem] shadow-sm border-2 ${net >= 0 ? 'bg-green-50 border-green-200 text-green-700' : 'bg-red-50 border-red-200 text-red-700'}`;
        }

        function updateChart(data) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if(expenseChart) expenseChart.destroy();
            expenseChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Jan', 'Fév', 'Mar', 'Avr', 'Mai', 'Juin', 'Juil', 'Août', 'Sep', 'Oct', 'Nov', 'Déc'],
                    datasets: [{
                        label: 'Dépenses',
                        data: data,
                        backgroundColor: '#f87171',
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { beginAtZero: true, grid: { display: false } }, x: { grid: { display: false } } }
                }
            });
        }

        // TABS
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.onclick = (e) => {
                const tabId = e.currentTarget.getAttribute('data-tab');
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('sidebar-active', 'text-white'));
                document.getElementById(tabId).classList.add('active');
                e.currentTarget.classList.add('sidebar-active');
            };
        });

        document.getElementById('e-date').valueAsDate = new Date();
        document.getElementById('s-date').valueAsDate = new Date();
    </script>
</body>
</html>
